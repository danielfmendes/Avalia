name: Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy API (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install, Inject Secret, & Deploy Backend
        run: |
          npm install
          printf "\ndatabase_id = \"%s\"\n" "${{ secrets.D1_DATABASE_ID }}" >> wrangler.toml
          npx wrangler deploy
        working-directory: api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Web-App (Pages)
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
        working-directory: frontend
        env:
          # Passes your deployed Worker URL into your React app at build time
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: avalia-frontend
          directory: frontend/dist